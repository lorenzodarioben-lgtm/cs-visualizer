<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive data structures and algorithms visualizer." />
    <title>CS Visualizer</title>
    <script>
      // Apply the saved/system theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('cs-visualizer:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (stored === 'dark' || (stored === null && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* ignore storage access errors */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
